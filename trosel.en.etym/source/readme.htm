<body>
  <h1>Etymological English — Predictive Text</h1>
  <p>This model adds word suggestions to the <b>Etymological English</b> keyboard.</p>
  <p>Make sure both packages are installed:</p>
  <ul>
    <li><code>english_etym</code> — the keyboard layout</li>
    <li><code>trosel.en.etym</code> — this predictive model</li>
  </ul>
  <p>They pair automatically through the language tag <code>en-x-etym</code>.</p>
</body>
